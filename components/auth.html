    <!-- register form -->
    <div class="modal fade" id="registerModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow">
                <div class="modal-header border-0 flex-column align-items-center position-relative pt-4">
                    <button type="button" class="btn-close position-absolute top-0 end-0 m-3" data-bs-dismiss="modal"></button>
                    <img src="images/logo.png" class="logo mb-3" style="width:70px">
                    <h3 class="fw-bold mb-1">Create Account</h3>
                    <p class="text-muted mb-0">Register to get started</p>
                </div>
                <div class="modal-body px-5 pb-4">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Full Name</label>
                        <input type="text" class="form-control" placeholder="Enter your full name">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="email" class="form-control" placeholder="Enter your email">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password"class="form-control"placeholder="Create a password">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Confirm Password</label>
                        <input type="password" class="form-control" placeholder="Confirm password">
                    </div>
                    <button class="btn bg-color text-white w-100 py-2 rounded-3 fw-semibold">
                        Register
                    </button>
                    <p class="text-center text-muted mt-4 mb-0">Already have an account?
                        <a href="#" class="text-decoration-none fw-semibold">
                            Login
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
