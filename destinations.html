<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destinations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/destinations.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/login-form.css">
</head>

<body>
    <div id="header-container"></div>
    <div class="container">
        <section class="destination-section py-5">
            <div class="container">
                <div class="destination-header text-center mb-5">
                    <span class="section-tag">Explore Cambodia</span>
                    <h2 class="mt-3">Destinations In Cambodia</h2>
                    <p class="text-muted">
                        Discover Cambodia's most beautiful beaches, mountains,
                        forests, and cultural landmarks.
                    </p>
                </div>

                <div class="d-flex justify-content-center flex-wrap gap-3 mb-5">
                    <button class="btn btn-filter active">All Destinations</button>
                    <button class="btn btn-filter" data-target="temple">
                        <i class="bi bi-water me-2"></i>
                        temple
                    </button>
                    <button class="btn btn-filter" data-target="beach">
                        <i class="bi bi-water me-2"></i>
                        Beach
                    </button>
                    <button class="btn btn-filter" data-target="mountain">
                        <i class="bi bi-triangle me-2"></i>
                        Mountain
                    </button>
                    <button class="btn btn-filter" data-target="forest">
                        <i class="bi bi-tree me-2"></i>
                        Forest
                    </button>
                </div>
            </div>
        </section>

        <div class="d-flex mb-5">
            <div class="row" id="destination-container">
            </div>
        </div>

    </div>
    

    <div id="auth-container"></div>
    
    <div id="footer-container"></div>
    <script src="js/include.js"></script>
    <script src="js/card.js"></script>
    <script src="js/head.js"></script>
    <script src="js/account.js"></script>
</body>

</html>
